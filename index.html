<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">


  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      background-color: hsl(212, 45%, 89%);
      font-family: "Outfit", sans-serif;
      font-optical-sizing: auto;
      font-style: normal;
    }
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
    }
    section {
      text-align: center;
      background-color: hsl(0, 0%, 100%);
      border-radius: 15px;
      width: 275px;
      height: 460px;
    }
    .title {
      font-weight: 700;
      font-size: 20px;
      color: hsl(218, 44%, 22%);
      padding: 0 10px;
    }
    .paragraph {
      font-weight: 400;
      font-size: 15px;
      color: hsl(216, 15%, 48%);
    }
    img {
      height: 250px;
      width: 250px;
      margin: 12px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <img src="images/image-qr-code.png" alt="QR-code">  
      <p class="title">Improve your front-end skills by building projects</p>
      <p class="paragraph">Scan the QR code to visit Frontend Mentor and take your coding skills to nextlevel!</p>
    </section>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Wiciu100</a>.
  </footer>
</body>
</html>
